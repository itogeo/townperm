<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0369a1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Town of Three Forks — City Services</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24'>🏔</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] } } } }</script>
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.js"></script>
  <style>
    body { margin: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
    input, select, textarea { font-size: 16px !important; }
    button, a, [role="button"] { touch-action: manipulation; }
    .mapboxgl-popup-content { padding: 0 !important; border-radius: 10px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
    .mapboxgl-popup-close-button { font-size: 18px; padding: 8px 12px; min-width: 44px; min-height: 44px; }
    .mapboxgl-popup-tip { border-top-color: white; }
    @media (max-width: 640px) { .mapboxgl-popup { max-width: 260px !important; } }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .toast-enter { animation: slideIn 0.3s ease-out; }
    .slide-up { animation: slideUp 0.3s ease-out; }
    .fade-up { animation: fadeUp 0.5s ease-out both; }
    .fade-up-d1 { animation: fadeUp 0.5s ease-out 0.1s both; }
    .fade-up-d2 { animation: fadeUp 0.5s ease-out 0.2s both; }
    .fade-up-d3 { animation: fadeUp 0.5s ease-out 0.3s both; }
    .fade-in { animation: fadeIn 0.6s ease-out both; }
    .hero-gradient { background: linear-gradient(135deg, #0c4a6e 0%, #075985 25%, #0369a1 50%, #0284c7 75%, #0ea5e9 100%); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    /* Accessibility: minimum readable font sizes */
    table th, table td { font-size: 13px !important; line-height: 1.4 !important; }
    .text-xs { font-size: 13px !important; line-height: 1.4 !important; }
    .text-\[10px\] { font-size: 12px !important; line-height: 1.4 !important; }
    .text-\[11px\] { font-size: 13px !important; line-height: 1.4 !important; }
    .text-\[9px\] { font-size: 11px !important; line-height: 1.4 !important; }
    @media print { .no-print { display: none !important; } }
    @media (max-width: 1023px) {
      .permit-detail-overlay { position: fixed !important; inset: 0 !important; z-index: 45 !important; overflow-y: auto !important; border-radius: 0 !important; }
      .permit-detail-overlay .sticky { position: relative !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    // Load JS files in order, concatenate, then Babel-compile as one unit
    (async () => {
      const files = ['/js/shared.js', '/js/map.js', '/js/public.js', '/js/staff.js', '/js/app.js'];
      const sources = await Promise.all(files.map(f => fetch(f).then(r => r.text())));
      const combined = sources.join('\n;\n');
      const compiled = Babel.transform(combined, { presets: ['react'] }).code;
      const script = document.createElement('script');
      script.textContent = compiled;
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
